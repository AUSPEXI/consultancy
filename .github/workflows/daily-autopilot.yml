name: Daily GEO Autopilot

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-autopilot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Resolve and validate config
        id: config
        run: |
          # Accept either APP_URL or SITE_URL — whichever is set
          SITE="${{ secrets.APP_URL }}"
          if [ -z "$SITE" ]; then
            SITE="${{ secrets.SITE_URL }}"
          fi
          SITE="${SITE%/}"  # strip trailing slash if present

          SECRET="${{ secrets.CRON_SECRET }}"

          echo "::debug::URL resolved to: $SITE"

          missing=()
          [ -z "$SITE" ]   && missing+=("APP_URL (or SITE_URL)")
          [ -z "$SECRET" ] && missing+=("CRON_SECRET")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing GitHub Secrets: ${missing[*]}"
            echo ""
            echo "Fix: GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            echo "  APP_URL      = https://auspexi.com"
            echo "  CRON_SECRET  = copy the CRON_SECRET value from Netlify env vars"
            exit 1
          fi

          echo "✓ Config valid — endpoint: ${SITE}/api/cron/daily-autopilot"
          echo "site=$SITE" >> "$GITHUB_OUTPUT"
          echo "secret=$SECRET" >> "$GITHUB_OUTPUT"

      - name: Trigger daily autopilot pipeline
        run: |
          echo "Triggering daily GEO autopilot at $(date -u)"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ steps.config.outputs.site }}/api/cron/daily-autopilot" \
            -H "Authorization: Bearer ${{ steps.config.outputs.secret }}" \
            -H "Content-Type: application/json" \
            --connect-timeout 15 \
            --max-time 1800)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          case "$HTTP_CODE" in
            200)
              echo "✓ Autopilot completed successfully"
              ;;
            000)
              echo "❌ Could not connect — check APP_URL is correct and Netlify site is live"
              exit 1
              ;;
            401)
              echo "❌ Unauthorized (401) — CRON_SECRET in GitHub does not match CRON_SECRET in Netlify env vars"
              exit 1
              ;;
            404)
              echo "❌ Not found (404) — /api/cron/daily-autopilot route missing. Check Netlify deploy is current."
              exit 1
              ;;
            500)
              echo "❌ Server error (500) — check Netlify function logs for the root cause"
              echo "Response body: $BODY"
              exit 1
              ;;
            *)
              echo "❌ Unexpected HTTP status $HTTP_CODE"
              echo "Response body: $BODY"
              exit 1
              ;;
          esac
