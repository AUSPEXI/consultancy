name: Daily GEO Autopilot

on:
  schedule:
    # Runs at 06:00 UTC every day
    - cron: '0 6 * * *'
  # Also allows manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  run-autopilot:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Trigger daily autopilot pipeline
        run: |
          echo "Triggering daily GEO autopilot at $(date -u)"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.SITE_URL }}/api/cron/daily-autopilot" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 1800)

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Autopilot failed with status $HTTP_CODE"
            exit 1
          fi

          echo "Autopilot completed successfully"
