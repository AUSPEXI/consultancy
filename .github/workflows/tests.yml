name: tests

on:
  push:
    branches: [main]
    paths: ['consultancy-next/**']
  pull_request:
    paths: ['consultancy-next/**']

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test --prefix consultancy-next
