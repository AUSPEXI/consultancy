<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Latent Space orbit rings embracing the L8 cluster -->
  <g fill="none" stroke-linecap="round">
    <ellipse cx="128" cy="128" rx="120" ry="62" transform="rotate(30 128 128)" stroke="#ffffff" stroke-width="3" opacity="0.55"/>
    <ellipse cx="128" cy="128" rx="120" ry="62" transform="rotate(-30 128 128)" stroke="#ff1493" stroke-width="4"/>
    <circle cx="22" cy="92" r="5" fill="#ff1493" stroke="none"/>
    <circle cx="234" cy="164" r="5" fill="#ffffff" stroke="none"/>
  </g>
  <!-- Bold L8 — the recognisable mark, legible at any size -->
  <text x="128" y="162" text-anchor="middle" font-family="'Outfit','Plus Jakarta Sans',sans-serif" font-size="118" font-weight="800" fill="#ffffff" letter-spacing="-4">L8</text>
</svg>
