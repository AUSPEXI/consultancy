<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Latent Space orbit rings -->
  <g stroke="#ff1493" stroke-width="2.5" fill="none" opacity="0.85">
    <ellipse cx="128" cy="128" rx="118" ry="58" transform="rotate(28 128 128)"/>
    <ellipse cx="128" cy="128" rx="118" ry="58" transform="rotate(-32 128 128)" opacity="0.5"/>
  </g>
  <!-- L8 wordmark -->
  <text x="40" y="150" font-family="'Outfit','Plus Jakarta Sans',sans-serif" font-size="92" font-weight="800" fill="#ffffff" letter-spacing="-3">L8</text>
  <!-- Ent key -->
  <g>
    <rect x="150" y="96" width="74" height="34" rx="7" fill="#ff1493"/>
    <text x="160" y="119" font-family="'JetBrains Mono',monospace" font-size="17" font-weight="700" fill="#000000">Ent</text>
    <text x="205" y="120" font-family="'JetBrains Mono',monospace" font-size="16" font-weight="700" fill="#000000">&#8629;</text>
  </g>
  <!-- Space bar key -->
  <g>
    <rect x="150" y="136" width="74" height="28" rx="7" fill="none" stroke="#ff1493" stroke-width="2.5"/>
    <text x="162" y="156" font-family="'JetBrains Mono',monospace" font-size="14" font-weight="700" fill="#ff1493" letter-spacing="2">SPACE</text>
  </g>
</svg>
